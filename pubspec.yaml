name: firstlook
description: FirstLook mobile application with enterprise-grade Flutter architecture.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  file_picker: ^8.1.7
  flutter_dotenv: ^5.1.0
  flutter_riverpod: ^2.6.1
  go_router: ^14.3.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2
  google_fonts: ^6.3.3
  intl: ^0.20.2
  json_annotation: ^4.9.0
  pretty_dio_logger: ^1.4.0
  connectivity_plus: ^6.0.5
  package_info_plus: ^8.0.2
  retry: ^3.1.2
  talker_flutter: ^4.4.1
  talker_dio_logger: ^4.4.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.3
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - .env.dev
    - .env.staging
    - .env.production
    - assets/translations/
    - assets/images/
    - assets/icons/
