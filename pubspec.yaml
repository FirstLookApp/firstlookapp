name: firstlook
description: FirstLook mobile application with enterprise-grade Flutter architecture.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  file_picker: ^8.1.7
  flutter_dotenv: ^5.1.0
  flutter_riverpod: ^2.6.1
  go_router: ^14.3.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2
  google_fonts: ^6.3.3
  intl: ^0.20.2
  retry: ^3.1.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - .env.dev
    - .env.staging
    - .env.production
    - assets/images/
    - assets/icons/
